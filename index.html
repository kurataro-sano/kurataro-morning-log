</section>

let labels={...defaultLabels,...JSON.parse(localStorage.getItem(LBL)||'{}')};
function $(id){return document.getElementById(id)} function num(v){return v===''||v==null?0:Number(v)||0} function today(){return new Date().toISOString().slice(0,10)} function dateFromIso(s){if(!s)return today(); const d=new Date(s); if(isNaN(d))return String(s).slice(0,10); return d.toISOString().slice(0,10)}
function showToast(t){const el=$('toast');el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',1800)}
function getLogs(){return JSON.parse(localStorage.getItem(LS)||'[]')} function setLogs(a){localStorage.setItem(LS,JSON.stringify(a));renderAll()}
function parseTSV(text){const lines=text.trim().split(/\n/).filter(Boolean); const head=lines.shift().split('\t'); return lines.map((line,i)=>{const c=line.split('\t'); const g=n=>c[head.indexOf(n)]??''; const r={id:'seed_'+(g('保存日時')||i),savedAt:g('保存日時'),updatedAt:g('更新日時'),tag:g('タグ'),date:dateFromIso(g('保存日時')),wakeTime:'',morningDay:num(g('朝活日目')),noSmokeDay:num(g('禁煙日目')),bed:num(g('ベッドメイク')),curtain:num(g('カーテンオープン')),water:num(g('白湯')),tongue:num(g('舌ぐるぐる')),muscle:num(g('筋トレ')),pray:num(g('瞑想・お祈り')),protein:num(g('青汁 or プロテイン')),wash:num(g('寝癖直し・洗顔')),health:num(g('ヘルスチェック')),tongueCount:num(g('舌ぐるぐる（回）')),squat:num(g('スクワット（回）')),pushup:num(g('腕立て（回）')),abs:num(g('腹筋（回）')),back:num(g('背筋（回）')),logText:g('朝活ログ'),weight:g('体重（kg）'),fat:g('体脂肪（％）'),muscleRate:g('骨格筋率（％）'),bodyAge:g('体年齢（歳）'),bmr:g('基礎代謝（cal）'),bmi:g('BMI'),englishMin:0,readingMin:0,xPost:0,storyPost:0}; return r;});}
function seedIfEmpty(){if(getLogs().length===0){setLogs(parseTSV(seedTSV));}}
function applyLabels(){document.querySelectorAll('[data-label]').forEach(el=>{const k=el.dataset.label; if(labels[k]) el.textContent=labels[k]});}
function editLabel(k){const next=prompt('項目名を編集', labels[k]||k); if(next){labels[k]=next; localStorage.setItem(LBL,JSON.stringify(labels)); renderForm(); applyLabels(); renderAll();}}
document.addEventListener('click',e=>{const b=e.target.closest('[data-edit]'); if(b) editLabel(b.dataset.edit); const tab=e.target.closest('[data-tab]'); if(tab){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));tab.classList.add('active');document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(tab.dataset.tab).classList.add('active');window.scrollTo(0,0);}});
function renderForm(){const rc=$('routineChecks'); rc.innerHTML=routineKeys.map(k=>`<div class="check"><label><span class="labelName"><span data-label="${k}">${labels[k]}</span><button class="pen" data-edit="${k}">✏️</button></span><input id="${k}" type="checkbox"></label></div>`).join(''); const tf=$('trainingFields'); tf.innerHTML=trainingKeys.map(k=>`<div class="field"><label><span class="labelName"><span data-label="${k}">${labels[k]}</span><button class="pen" data-edit="${k}">✏️</button></span></label><input class="input" id="${k}" type="number"></div>`).join(''); const bf=$('bodyFields'); bf.innerHTML=bodyKeys.map(k=>`<div class="field"><label><span class="labelName"><span data-label="${k}">${labels[k]}</span><button class="pen" data-edit="${k}">✏️</button></span></label><input class="input" id="${k}" inputmode="decimal"></div>`).join(''); applyLabels();}
function blank(){ $('editId').value=''; $('date').value=today(); $('wakeTime').value=''; $('morningDay').value=''; $('noSmokeDay').value=''; [...routineKeys,...trainingKeys,...bodyKeys].forEach(k=>{const el=$(k); if(!el)return; if(el.type==='checkbox')el.checked=false; else el.value='';}); ['englishMin','readingMin'].forEach(k=>$(k).value=''); $('xPost').value='0'; $('storyPost').value='0'; $('logText').value=''; const logs=getLogs().sort((a,b)=>num(b.morningDay)-num(a.morningDay)); if(logs[0]){ $('morningDay').value=num(logs[0].morningDay)+1; $('noSmokeDay').value=num(logs[0].noSmokeDay)+1; }}
function collect(){const id=$('editId').value||('log_'+Date.now()); const r={id,date:$('date').value||today(),savedAt:new Date().toISOString(),updatedAt:$('editId').value?new Date().toISOString():'',wakeTime:$('wakeTime').value,morningDay:num($('morningDay').value),noSmokeDay:num($('noSmokeDay').value),englishMin:num($('englishMin').value),readingMin:num($('readingMin').value),xPost:num($('xPost').value),storyPost:num($('storyPost').value),logText:$('logText').value}; routineKeys.forEach(k=>r[k]=$(k).checked?1:0); trainingKeys.forEach(k=>r[k]=num($(k).value)); bodyKeys.forEach(k=>r[k]=$(k).value); return r;}
function save(){let logs=getLogs(); const r=collect(); const i=logs.findIndex(x=>x.id===r.id); if(i>=0) logs[i]={...logs[i],...r}; else logs.unshift(r); setLogs(logs); blank(); showToast('保存したで🌱');}
function edit(id){const r=getLogs().find(x=>x.id===id); if(!r)return; $('editId').value=r.id; $('date').value=r.date||dateFromIso(r.savedAt); $('wakeTime').value=r.wakeTime||''; $('morningDay').value=r.morningDay||''; $('noSmokeDay').value=r.noSmokeDay||''; routineKeys.forEach(k=>$(k).checked=!!num(r[k])); trainingKeys.forEach(k=>$(k).value=r[k]||''); bodyKeys.forEach(k=>$(k).value=r[k]||''); $('englishMin').value=r.englishMin||''; $('readingMin').value=r.readingMin||''; $('xPost').value=r.xPost||0; $('storyPost').value=r.storyPost||0; $('logText').value=r.logText||''; document.querySelector('[data-tab="input"]').click();}
function del(id){if(confirm('削除する？')) setLogs(getLogs().filter(x=>x.id!==id));}
function renderDash(){const logs=getLogs(); const now=new Date(); const ym=now.toISOString().slice(0,7); const month=logs.filter(r=>(r.date||dateFromIso(r.savedAt)).slice(0,7)===ym); const latest=logs.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0]||{}; const sum=k=>month.reduce((a,r)=>a+num(r[k]),0); const training=sum('squat')+sum('pushup')+sum('abs')+sum('back'); const done=month.length; const cards=[['朝活',done+'日'],['禁煙', (latest.noSmokeDay||0)+'日'],['英語',sum('englishMin')+'分'],['読書',sum('readingMin')+'分'],['筋トレ合計',training+'回'],['X投稿',sum('xPost')+'回'],['ストーリー',sum('storyPost')+'回'],['最新体重',(latest.weight||'-')+'kg']]; $('dash').innerHTML=cards.map(c=>`<div class="stat"><div class="num">${c[1]}</div><div class="lab">${c[0]}</div></div>`).join(''); const max=(k)=>month.reduce((m,r)=>Math.max(m,num(r[k])),0); $('best').innerHTML=`<span class="pill">スクワット ${max('squat')}回</span><span class="pill">腕立て ${max('pushup')}回</span><span class="pill">英語 ${max('englishMin')}分</span><span class="pill">読書 ${max('readingMin')}分</span>`; const ws=logs.filter(r=>r.weight).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(-18); const vals=ws.map(r=>Number(r.weight)); const min=Math.min(...vals,68), maxv=Math.max(...vals,73); $('weightChart').innerHTML=ws.map(r=>`<div title="${r.date} ${r.weight}kg" style="height:${Math.max(5,((Number(r.weight)-min)/(maxv-min||1))*95+5)}%"></div>`).join('') || '<p class="small">データなし</p>';}
function renderHistory(){const logs=getLogs().slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')); $('historyList').innerHTML=logs.map(r=>`<div class="historyItem"><div class="historyTop"><div><b>${r.date||dateFromIso(r.savedAt)}</b><div class="small">朝活${r.morningDay||'-'}日目 / 禁煙${r.noSmokeDay||'-'}日目</div></div><div class="btns"><button class="btn secondary" onclick="edit('${r.id}')">✏️</button><button class="btn danger" onclick="del('${r.id}')">削除</button></div></div><div><span class="pill">体重 ${r.weight||'-'}kg</span><span class="pill">SQ ${r.squat||0}</span><span class="pill">腕 ${r.pushup||0}</span><span class="pill">英語 ${r.englishMin||0}分</span><span class="pill">読書 ${r.readingMin||0}分</span></div><p>${(r.logText||'').replace(/</g,'&lt;')}</p></div>`).join('') || '<p class="small">まだ記録なし</p>';}
function makeX(){const logs=getLogs().slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')); const r=logs[0]; if(!r)return ''; return `朝活${r.morningDay||'-'}日目 / 禁煙${r.noSmokeDay||'-'}日目\n\n白湯・カーテン・筋トレ・ログ完了。\n英語 ${r.englishMin||0}分 / 読書 ${r.readingMin||0}分\n体重 ${r.weight||'-'}kg\n\n${r.logText||''}\n\n#朝活 #習慣化`;}
function renderTools(){ $('xDraft').textContent=makeX();}
function renderAll(){renderDash();renderHistory();renderTools();}
function exportCSV(){const keys=['savedAt','updatedAt','date','wakeTime','morningDay','noSmokeDay',...routineKeys,...trainingKeys,'englishMin','readingMin','xPost','storyPost','logText',...bodyKeys]; const rows=[keys.join(',')].concat(getLogs().map(r=>keys.map(k=>'"'+String(r[k]??'').replace(/"/g,'""')+'"').join(','))); const blob=new Blob([rows.join('\n')],{type:'text/csv'}); const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='morning-log-v6.csv';a.click();}
$('saveBtn').onclick=save; $('resetBtn').onclick=blank; $('exportBtn').onclick=exportCSV; $('copyXBtn').onclick=async()=>{await navigator.clipboard.writeText(makeX());showToast('X文コピーしたで')}; $('importBtn').onclick=()=>{const t=$('importText').value; if(!t.trim())return; const imported=parseTSV(t); setLogs([...imported,...getLogs()]); showToast(imported.length+'件取り込み');}; $('seedBtn').onclick=()=>{setLogs([...parseTSV(seedTSV),...getLogs().filter(r=>!String(r.id).startsWith('seed_'))]);showToast('初期ログ再投入')}; $('resetDataBtn').onclick=()=>{if(confirm('全ログ削除する？')){localStorage.removeItem(LS);renderAll();blank();}};
renderForm(); seedIfEmpty(); blank(); renderAll();
</script>
